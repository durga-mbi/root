version: '3.8'

services:
  # Central Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: mern_nginx
    ports:
      - "82:80"   # Host 82 -> Container 80
      - "444:443" # Host 444 -> Container 443
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro # Mount the SSL certs
    depends_on:
      - backend
      - frontend
    restart: always
    networks:
      - mern_network

  # React Frontend
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: mern_frontend
    environment:
      - VITE_API_BASE_URL=/api
    depends_on:
      - backend
    restart: always
    networks:
      - mern_network

  # Node.js Express Backend
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: mern_backend
    env_file:
      - ./server/.env
    # Optional dynamic environment injection
    # environment:
    #   - PORT=5000
    #   - MONGO_URI=${MONGO_URI}
    expose:
      - "5000"
    command: npm run dev # Use nodemon for hot-reloading in watch mode
    develop:
      watch:
        - action: sync
          path: ./server
          target: /app
          ignore:
            - node_modules/
    restart: always
    networks:
      - mern_network

networks:
  mern_network:
    driver: bridge
