events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    # HTTP to HTTPS Redirect
    server {
        listen 80;
        server_name mindvex.cloud admin.mindvex.cloud user-api.mindvex.cloud admin-api.mindvex.cloud;
        return 301 https://$host$request_uri;
    }

    # SSL Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Common Proxy Headers
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    # User Frontend
    server {
        listen 443 ssl;
        server_name mindvex.cloud;
        ssl_certificate /etc/letsencrypt/live/mindvex.cloud-0001/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/mindvex.cloud-0001/privkey.pem;

        location / {
            proxy_pass http://user-frontend:5173;
        }
    }

    # Admin Frontend
    server {
        listen 443 ssl;
        server_name admin.mindvex.cloud;
        ssl_certificate /etc/letsencrypt/live/mindvex.cloud-0001/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/mindvex.cloud-0001/privkey.pem;

        location / {
            proxy_pass http://admin-frontend:5174;
        }
    }

    # User API
    server {
        listen 443 ssl;
        server_name user-api.mindvex.cloud;
        ssl_certificate /etc/letsencrypt/live/mindvex.cloud-0001/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/mindvex.cloud-0001/privkey.pem;

        location / {
            proxy_pass http://user:3001;
        }
    }

    # Admin API
    server {
        listen 443 ssl;
        server_name admin-api.mindvex.cloud;
        ssl_certificate /etc/letsencrypt/live/mindvex.cloud-0001/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/mindvex.cloud-0001/privkey.pem;

        location / {
            proxy_pass http://admin:3000;
        }
    }
}
