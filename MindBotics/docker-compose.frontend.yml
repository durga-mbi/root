version: '3.8'

services:
  # Edge Proxy
  nginx:
    image: nginx:alpine
    container_name: mern_nginx
    ports:
      - "8000:80" # Avoids restricted ports
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
    restart: always
    networks:
      - mern_network

  # React Frontend
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: mern_frontend
    environment:
      - VITE_API_BASE_URL=/api
    restart: always
    networks:
      - mern_network

networks:
  mern_network:
    driver: bridge
